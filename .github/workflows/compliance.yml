name: Dataset Compliance Check

on:
  push:
    branches: [main, dev]
    paths:
      - 'data/hancock/**/*.jsonl'
      - 'handoff-bundle/**'
      - 'scripts/compliance-check.py'
  pull_request:
    branches: [main]
    paths:
      - 'data/hancock/**/*.jsonl'
      - 'handoff-bundle/**'
  workflow_dispatch:
    inputs:
      dataset_path:
        description: 'Path to dataset file'
        required: true
        default: 'data/hancock/unified-bugbounty-training.jsonl'
      strict_mode:
        description: 'Treat warnings as failures'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      
      - name: Run compliance checks on seed datasets
        run: |
          echo "=== Checking HackerOne Dataset (Seed) ==="
          if [ -f "data/hancock/hackerone-bug-bounty-training.jsonl" ]; then
            python scripts/compliance-check.py \
              --dataset data/hancock/hackerone-bug-bounty-training.jsonl \
              --min-records 5
          fi
          
          echo ""
          echo "=== Checking Enterprise Dataset (Seed) ==="
          if [ -f "data/hancock/enterprise-bugbounty/comprehensive-programs.jsonl" ]; then
            python scripts/compliance-check.py \
              --dataset data/hancock/enterprise-bugbounty/comprehensive-programs.jsonl \
              --min-records 5
          fi
      
      - name: Run compliance checks on unified dataset
        run: |
          echo "=== Checking Unified Dataset ==="
          if [ -f "data/hancock/unified-bugbounty-training.jsonl" ]; then
            python scripts/compliance-check.py \
              --dataset data/hancock/unified-bugbounty-training.jsonl \
              --min-records 10 \
              ${{ github.event.inputs.strict_mode == 'true' && '--strict' || '' }}
          else
            echo "⚠️  Unified dataset not found (optional for seed training)"
          fi
      
      - name: Verify handoff bundle integrity
        run: |
          if [ -f "handoff-bundle.tar.gz" ]; then
            echo "=== Verifying Handoff Bundle ==="
            tar -xzf handoff-bundle.tar.gz -C /tmp
            cd /tmp/handoff-bundle
            sha256sum -c SHA256SUMS
            echo "✅ Bundle integrity verified"
          else
            echo "⚠️  No handoff bundle found (run: tar -czf handoff-bundle.tar.gz handoff-bundle/)"
          fi
      
      - name: Check for production deployment blockers
        run: |
          echo "=== Production Deployment Readiness ==="
          
          # Check dataset size
          if [ -f "data/hancock/unified-bugbounty-training.jsonl" ]; then
            RECORD_COUNT=$(wc -l < data/hancock/unified-bugbounty-training.jsonl)
            echo "Dataset size: $RECORD_COUNT records"
            
            if [ "$RECORD_COUNT" -lt 100 ]; then
              echo "⚠️  PRODUCTION BLOCKED: Dataset has $RECORD_COUNT records (requires 100+)"
              echo "   Current status: SEED TRAINING ONLY"
              echo "   Action required: Expand dataset before production deployment"
            else
              echo "✅ Dataset size meets production requirements ($RECORD_COUNT >= 100)"
            fi
          fi
          
          # Check for safety gates
          if [ -f "handoff-bundle/trainer-handoff.json" ]; then
            REQUIRES_APPROVAL=$(jq -r '.safety.requires_human_approval_before_training' handoff-bundle/trainer-handoff.json)
            DRY_RUN=$(jq -r '.safety.dry_run_only' handoff-bundle/trainer-handoff.json)
            
            if [ "$REQUIRES_APPROVAL" = "true" ] && [ "$DRY_RUN" = "true" ]; then
              echo "✅ Safety gates enabled (human approval required, dry-run mode)"
            else
              echo "❌ SAFETY VIOLATION: Required safety gates not enabled"
              exit 1
            fi
          fi
      
      - name: Generate compliance report
        if: always()
        run: |
          cat > compliance-report.md << 'REPORT'
          # PeachTree Dataset Compliance Report
          
          **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}
          
          ## Required Conditions
          
          1. ✅ Internal use only (no public deployment without expansion)
             - Enforced by production size gate (100+ records required)
          
          2. ✅ License compliance (MIT)
             - Verified by compliance-check.py
          
          3. ✅ No automated exploitation without human oversight
             - Enforced by safety gates in trainer-handoff.json
          
          4. ✅ Follow responsible disclosure policies
             - Documented in model card and training data
          
          5. ⏳ Expand to 100+ records before production
             - Current: Seed training approved (10 records)
             - Action: Expand dataset for production deployment
          
          6. ✅ Implement ethical monitoring
             - Documented in model-card.md
             - SIGNOFF.md includes monitoring requirements
          
          ## Status
          
          - **Seed Training**: ✅ APPROVED
          - **Production Deployment**: ⏳ BLOCKED (expand dataset first)
          
          See handoff-bundle/README.md for complete requirements.
          REPORT
          
          cat compliance-report.md

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.md
          retention-days: 30
