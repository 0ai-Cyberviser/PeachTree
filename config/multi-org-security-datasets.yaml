# Dataset Ingestion Strategy
ingestion_strategy:
  primary_organization: "MITRE-Cyber-Security-CVE-Database"
  
  priority_tiers:
    critical:
      - "mitre-cve-database"  # Primary CVE source
    
    high:
      - "metasploit-framework"  # 15k stars
      - "sqlmap"  # 6.2k stars
      - "john"  # 2.5k stars
      - "clamav"  # Malware signatures
      - "snort3"  # IDS/IPS
      - "grok-promptss"  # Security prompts
    
    medium:
      - "fastapi"  # 9.2k stars, API patterns
      - "wifite2"  # Wireless security
      - "commando-vm"  # Pentesting VM
      - "cobalt-strike-community_kit"  # Red team
      - "InfectedAI"  # AI security
    
    low:
      - "pydantic"  # Data validation
      - "whoosh-reloaded"  # Search
      - "predator-os"  # Tool collection
      - "SatIntel"  # OSINT
      - "tgrok"  # Custom tools
      - "codegrok"  # Code analysis
    
    exclude:
      - "demo-repository"  # Private demo

# License Compliance Matrix
license_compliance:
  safe_for_commercial:
    - "MIT"  # mitre-cve-database, fastapi, pydantic, tgrok, codegrok
    - "Apache-2.0"  # commando-vm, cobalt-strike-community_kit
  
  requires_review:
    - "GPL-2.0"  # clamav, wifite2 (copyleft, may restrict commercial use)
    - "AGPL-3.0"  # grok-promptss (network copyleft)
  
  verify_before_use:
    - "Other"  # metasploit-framework, sqlmap, john, whoosh-reloaded, predator-os, SatIntel, InfectedAI

# PeachTree Integration Commands
peachtree_commands:
  # 1. Clone all critical repositories
  clone_critical:
    - "git clone https://github.com/MITRE-Cyber-Security-CVE-Database/mitre-cve-database /tmp/datasets/mitre-cve"
    - "git clone https://github.com/MITRE-Cyber-Security-CVE-Database/metasploit-framework /tmp/datasets/metasploit"
    - "git clone https://github.com/MITRE-Cyber-Security-CVE-Database/sqlmap /tmp/datasets/sqlmap"
    - "git clone https://github.com/MITRE-Cyber-Security-CVE-Database/john /tmp/datasets/john"
    - "git clone https://github.com/MITRE-Cyber-Security-CVE-Database/clamav /tmp/datasets/clamav"
    - "git clone https://github.com/MITRE-Cyber-Security-CVE-Database/snort3 /tmp/datasets/snort3"
    - "git clone https://github.com/MITRE-Cyber-Security-CVE-Database/grok-promptss /tmp/datasets/grok-prompts"
  
  # 2. Ingest CVE database (CRITICAL - primary source)
  ingest_cve:
    command: "peachtree ingest"
    args:
      - "--repo /tmp/datasets/mitre-cve"
      - "--pattern '**/*.json,**/*.xml,**/*.txt'"
      - "--output /tmp/peachtree/data/raw/cve-records.jsonl"
      - "--metadata '{\"source\": \"mitre-cve\", \"org\": \"MITRE-Cyber-Security-CVE-Database\", \"priority\": \"critical\"}'"
  
  # 3. Ingest Metasploit documentation
  ingest_metasploit:
    command: "peachtree ingest"
    args:
      - "--repo /tmp/datasets/metasploit"
      - "--pattern 'modules/**/*.rb,documentation/**/*.md'"
      - "--output /tmp/peachtree/data/raw/metasploit-modules.jsonl"
      - "--metadata '{\"source\": \"metasploit\", \"org\": \"MITRE-Cyber-Security-CVE-Database\", \"priority\": \"high\"}'"
  
  # 4. Ingest Grok security prompts
  ingest_grok_prompts:
    command: "peachtree ingest"
    args:
      - "--repo /tmp/datasets/grok-prompts"
      - "--pattern '**/*.jinja,**/*.md,**/*.txt'"
      - "--output /tmp/peachtree/data/raw/grok-security-prompts.jsonl"
      - "--metadata '{\"source\": \"grok-prompts\", \"org\": \"MITRE-Cyber-Security-CVE-Database\", \"priority\": \"high\"}'"
  
  # 5. Build unified security dataset
  build_unified:
    command: "peachtree build"
    args:
      - "--input /tmp/peachtree/data/raw/cve-records.jsonl"
      - "--input /tmp/peachtree/data/raw/metasploit-modules.jsonl"
      - "--input /tmp/peachtree/data/raw/grok-security-prompts.jsonl"
      - "--policy /tmp/peachtree/policies/security-dataset.yaml"
      - "--output /tmp/peachtree/data/datasets/multi-org-security-training.jsonl"
  
  # 6. Audit combined dataset
  audit_combined:
    command: "peachtree audit"
    args:
      - "--input /tmp/peachtree/data/datasets/multi-org-security-training.jsonl"
      - "--output /tmp/peachtree/reports/multi-org-audit.json"
      - "--detailed"
  
  # 7. Generate Hancock training handoff
  hancock_handoff:
    command: "peachtree handoff"
    args:
      - "--dataset /tmp/peachtree/data/datasets/multi-org-security-training.jsonl"
      - "--output /tmp/peachtree/data/manifests/hancock-multi-org-handoff.json"
      - "--model hancock-cybersecurity-llm"
      - "--training-config /tmp/peachtree/configs/hancock-training.yaml"

# Ethical Use Requirements
ethical_use:
  purpose: "Defensive cybersecurity and security research only"
  restrictions:
    - "NO offensive hacking or malicious use"
    - "NO weaponization of exploit code"
    - "NO unauthorized penetration testing"
    - "MUST obtain legal review before training"
    - "MUST include ethical use agreement in model card"
  
  required_reviews:
    - "Legal approval"
    - "Security review"
    - "Ethics committee approval"
    - "Export control compliance (if international deployment)"
  
  data_filtering:
    - "Remove live exploit code (documentation only)"
    - "Redact actual credentials from CVE reports"
    - "Filter weaponizable payloads"
    - "Maintain provenance for all records"

