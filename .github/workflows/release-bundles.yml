name: PeachTree Release Bundles CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
    paths:
      - "src/peachtree/registry.py"
      - "src/peachtree/signing.py"
      - "src/peachtree/sbom.py"
      - "src/peachtree/release_bundle.py"
      - "src/peachtree/cli.py"
      - "tests/test_release_bundles.py"
      - "docs/RELEASE_BUNDLES.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-bundles:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - run: pytest -q tests/test_release_bundles.py
      - run: pytest -q
