name: PeachTree Lineage Graph CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
    paths:
      - "src/peachtree/dependency_graph.py"
      - "src/peachtree/lineage.py"
      - "src/peachtree/cli.py"
      - "tests/test_lineage_graphs.py"
      - "docs/LINEAGE_MAPS.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lineage-graphs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - run: pytest -q tests/test_lineage_graphs.py
      - run: pytest -q
