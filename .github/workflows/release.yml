name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel twine

    - name: Build distribution
      run: python -m build

    - name: Create Release Notes
      id: release_notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "## PeachTree $VERSION" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### Release Artifacts" >> RELEASE_NOTES.md
        echo "- \`dist/peachtree_ai-$VERSION-py3-none-any.whl\`" >> RELEASE_NOTES.md
        echo "- \`dist/peachtree-ai-$VERSION.tar.gz\`" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "**Installation:**" >> RELEASE_NOTES.md
        echo "\`\`\`bash" >> RELEASE_NOTES.md
        echo "pip install peachtree-ai==$VERSION" >> RELEASE_NOTES.md
        echo "\`\`\`" >> RELEASE_NOTES.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/* || echo "PyPI upload skipped (no token configured)"
