name: PeachTree Policy Packs CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
    paths:
      - "src/peachtree/policy_packs.py"
      - "src/peachtree/license_gate.py"
      - "src/peachtree/model_card.py"
      - "src/peachtree/cli.py"
      - "tests/test_policy_packs.py"
      - "docs/POLICY_PACKS.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy-packs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - run: pytest -q tests/test_policy_packs.py
      - run: pytest -q
