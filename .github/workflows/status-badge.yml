name: Status Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-badge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Collect metrics
        id: metrics
        run: |
          # Get test count and pass rate
          tests=$(python -m pytest tests/ --collect-only -q | tail -1 | awk '{print $1}')
          echo "tests=$tests" >> $GITHUB_OUTPUT
          
          # Get coverage
          coverage=$(python -m pytest tests/ --cov=src/peachtree --cov-report=term 2>/dev/null | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          echo "coverage=$coverage" >> $GITHUB_OUTPUT
          
          # Get version
          version=$(grep version pyproject.toml | head -1 | awk -F'"' '{print $2}')
          echo "version=$version" >> $GITHUB_OUTPUT
          
          # Get Python version
          python_version=$(python --version | awk '{print $2}')
          echo "python_version=$python_version" >> $GITHUB_OUTPUT

      - name: Create badges
        run: |
          mkdir -p status-badges
          
          # Tests badge
          echo '{"schemaVersion":1,"label":"tests","message":"${{ steps.metrics.outputs.tests }}","color":"brightgreen"}' > status-badges/tests.json
          
          # Coverage badge
          echo '{"schemaVersion":1,"label":"coverage","message":"${{ steps.metrics.outputs.coverage }}%","color":"brightgreen"}' > status-badges/coverage.json
          
          # Version badge
          echo '{"schemaVersion":1,"label":"version","message":"${{ steps.metrics.outputs.version }}","color":"blue"}' > status-badges/version.json
          
          # Python badge
          echo '{"schemaVersion":1,"label":"python","message":"${{ steps.metrics.outputs.python_version }}+","color":"blue"}' > status-badges/python.json
          
          # Status badge
          echo '{"schemaVersion":1,"label":"status","message":"stable","color":"brightgreen"}' > status-badges/status.json

      - name: Upload badge artifacts
        uses: actions/upload-artifact@v3
        with:
          name: status-badges
          path: status-badges/
          retention-days: 90

      - name: Comment badges on PRs
        if: github.event_name == 'push'
        run: |
          echo "✅ **Status Badges Generated**"
          echo ""
          echo "Metrics:"
          echo "- Tests: ${{ steps.metrics.outputs.tests }}"
          echo "- Coverage: ${{ steps.metrics.outputs.coverage }}%"
          echo "- Version: ${{ steps.metrics.outputs.version }}"
          echo "- Python: ${{ steps.metrics.outputs.python_version }}+"
